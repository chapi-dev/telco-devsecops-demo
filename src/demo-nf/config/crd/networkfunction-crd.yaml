apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networkfunctions.nf.telco-demo.io
spec:
  group: nf.telco-demo.io
  names:
    kind: NetworkFunction
    listKind: NetworkFunctionList
    plural: networkfunctions
    singular: networkfunction
    shortNames: [nf]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [type, image]
              properties:
                type:
                  type: string
                  enum: [UPF, AMF, SMF, NRF, UDM, AUSF, PCF, UDR, SMSF]
                replicas:
                  type: integer
                  minimum: 0
                  default: 1
                image:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
