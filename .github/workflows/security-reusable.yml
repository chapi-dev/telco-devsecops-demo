name: security-reusable

# Minimum security scan set every NF repo in the org should run.
# Call from another workflow:
#   uses: chapi-dev/telco-devsecops-demo/.github/workflows/security-reusable.yml@main

on:
  workflow_call:
    inputs:
      scan-path:
        type: string
        required: false
        default: '.'

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.scan-path }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy-reusable

      - name: Checkov (IaC)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.scan-path }}
          framework: terraform,kubernetes,helm
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov
