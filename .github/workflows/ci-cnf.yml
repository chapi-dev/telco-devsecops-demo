name: ci-cnf

on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - 'src/**'
      - '.github/workflows/ci-cnf.yml'
  pull_request:
    paths:
      - 'charts/**'
      - 'src/**'
      - '.github/workflows/ci-cnf.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write           # OIDC -> Azure & Sigstore keyless
  packages: write
  attestations: write
  security-events: write

env:
  ACR: acrtelcodemo.azurecr.io
  CHART_DIR: charts/demo-upf
  IMAGE_REPO: acrtelcodemo.azurecr.io/nf/demo-nf
  IMAGE_TAG: "1.0.0"

jobs:
  build:
    name: Build · scan · sign · push
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.gate.outputs.ready }}
      image_digest: ${{ steps.image.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Setup Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.0

      - name: Setup Syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Setup kubeconform
        run: |
          curl -sSLO https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo install kubeconform /usr/local/bin/

      - name: Helm lint
        run: helm lint $CHART_DIR

      - name: Helm dependency update
        run: helm dependency update $CHART_DIR

      - name: Render & validate manifests (kubeconform)
        run: |
          helm template demo-upf $CHART_DIR \
            | kubeconform -strict -summary -ignore-missing-schemas

      - name: Helm package
        id: pkg
        run: |
          mkdir -p dist
          helm package $CHART_DIR -d dist/
          echo "pkg=$(ls dist/*.tgz)" >> $GITHUB_OUTPUT
          echo "version=$(yq '.version' $CHART_DIR/Chart.yaml)" >> $GITHUB_OUTPUT

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: charts/
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Generate SBOM (SPDX)
        run: |
          syft "dir:$CHART_DIR" -o spdx-json > sbom.spdx.json

      - name: Detect Azure credentials
        id: gate
        run: |
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_TENANT_ID }}" ] && \
             [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::Azure secrets not configured; skipping ACR push & cosign sign. \
            Set AZURE_CLIENT_ID, AZURE_TENANT_ID and AZURE_SUBSCRIPTION_ID after running infra/terraform."
          fi

      - name: Should publish?
        id: should
        run: |
          if [ "${{ steps.gate.outputs.ready }}" = "true" ] && \
             { [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
               { [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; }; }; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure login (OIDC)
        if: steps.should.outputs.go == 'true'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        if: steps.should.outputs.go == 'true'
        run: az acr login -n acrtelcodemo

      - name: Build & push container image (demo-nf)
        id: image
        if: steps.should.outputs.go == 'true'
        run: |
          docker build -t $IMAGE_REPO:$IMAGE_TAG src/demo-nf/
          docker push $IMAGE_REPO:$IMAGE_TAG
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' $IMAGE_REPO:$IMAGE_TAG | cut -d@ -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Pushed $IMAGE_REPO@$DIGEST"

      - name: Cosign sign container image (keyless)
        if: steps.should.outputs.go == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "$IMAGE_REPO@${{ steps.image.outputs.digest }}"

      - name: Generate container SBOM
        if: steps.should.outputs.go == 'true'
        run: |
          syft "$IMAGE_REPO:$IMAGE_TAG" -o spdx-json > image-sbom.spdx.json

      - name: Cosign attest container SBOM
        if: steps.should.outputs.go == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes --type spdxjson \
            --predicate image-sbom.spdx.json \
            "$IMAGE_REPO@${{ steps.image.outputs.digest }}"

      - name: Push Helm chart to ACR (OCI)
        if: steps.should.outputs.go == 'true'
        run: |
          helm push ${{ steps.pkg.outputs.pkg }} oci://$ACR/charts

      - name: Cosign sign chart (keyless)
        if: steps.should.outputs.go == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          REF=$ACR/charts/demo-upf:${{ steps.pkg.outputs.version }}
          cosign sign --yes "$REF"

      - name: Cosign attest chart SBOM
        if: steps.should.outputs.go == 'true'
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          REF=$ACR/charts/demo-upf:${{ steps.pkg.outputs.version }}
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json "$REF"

      - name: SLSA L3 build provenance attestation
        if: steps.should.outputs.go == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*.tgz

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-upf-${{ steps.pkg.outputs.version }}
          path: |
            dist/*.tgz
            sbom.spdx.json
            trivy-fs.sarif
          retention-days: 30
