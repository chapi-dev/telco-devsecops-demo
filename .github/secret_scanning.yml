# Note: custom secret-scanning patterns live in repo Settings → Code security
# (UI-only at the time of writing). The patterns below are documented here so
# that the demo can be rebuilt deterministically.
#
# Pattern name                | Regex                          | Description
# ----------------------------|--------------------------------|-------------------------------
# Telco IMSI                  | (?<![0-9])[0-9]{15}(?![0-9])   | 3GPP IMSI (15 digits)
# Telco SUPI (NAI)            | imsi-[0-9]{15}                 | 5G SUPI in NAI form
# Telco K (auth key)          | (?i)\b[0-9A-F]{32}\b           | UICC/USIM K (128-bit)
# Telco OPc                   | (?i)\bopc[:= ]+[0-9A-F]{32}\b  | Operator variant key
# Azure AKS kubeconfig token  | apiVersion:\s*v1\nclusters:    | accidental kubeconfig push
#
# See docs/SECRET_SCANNING.md for screenshots of how to add these via the UI.
